<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BodyMind Academy | Yazan Jafari - Pain Science, Dopamine & Neuroplasticity</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════════════════════
           ROOT VARIABLES & RESET
           ═══════════════════════════════════════════════════════════════ */
        :root {
            --primary-dark: #0a0a1a;
            --secondary-dark: #12122a;
            --accent-purple: #7c3aed;
            --accent-blue: #3b82f6;
            --accent-pink: #ec4899;
            --accent-cyan: #06b6d4;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --glass-bg: rgba(124, 58, 237, 0.05);
            --glass-border: rgba(124, 58, 237, 0.2);
            --gradient-main: linear-gradient(135deg, #7c3aed 0%, #3b82f6 50%, #ec4899 100%);
            --gradient-text: linear-gradient(135deg, #7c3aed, #3b82f6, #ec4899);
            --gradient-dark: linear-gradient(180deg, #0a0a1a 0%, #12122a 50%, #1a1a3a 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--primary-dark);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ═══════════════════════════════════════════════════════════════
           SCROLL PROGRESS BAR
           ═══════════════════════════════════════════════════════════════ */
        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: var(--gradient-main);
            width: 0%;
            z-index: 10000;
            transition: width 0.1s linear;
        }

        /* ═══════════════════════════════════════════════════════════════
           HEADER & NAVIGATION
           ═══════════════════════════════════════════════════════════════ */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 1rem 2rem;
            background: rgba(10, 10, 26, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        header.scrolled {
            padding: 0.75rem 2rem;
            background: rgba(10, 10, 26, 0.95);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .logo span {
            font-weight: 400;
            opacity: 0.8;
        }

        nav {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .nav-item {
            position: relative;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.75rem 1.25rem;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: var(--glass-bg);
        }

        .nav-link .arrow {
            font-size: 0.7rem;
            transition: transform 0.3s ease;
        }

        .nav-item:hover .arrow {
            transform: rotate(180deg);
        }

        /* Dropdown Menu */
        .dropdown {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            min-width: 320px;
            background: rgba(18, 18, 42, 0.98);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .nav-item:hover .dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .dropdown-item:hover {
            background: var(--glass-bg);
            padding-left: 1.5rem;
        }

        .dropdown-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .dropdown-icon.purple { background: rgba(124, 58, 237, 0.2); }
        .dropdown-icon.blue { background: rgba(59, 130, 246, 0.2); }
        .dropdown-icon.pink { background: rgba(236, 72, 153, 0.2); }
        .dropdown-icon.cyan { background: rgba(6, 182, 212, 0.2); }

        .dropdown-text h4 {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .dropdown-text p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .dropdown-divider {
            height: 1px;
            background: var(--glass-border);
            margin: 0.75rem 0;
        }

        /* Mobile Menu */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
            padding: 10px;
        }

        .hamburger span {
            width: 28px;
            height: 2px;
            background: var(--text-primary);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        /* ═══════════════════════════════════════════════════════════════
           HERO PARALLAX - FASTER SCROLL (250vh instead of 400vh)
           ═══════════════════════════════════════════════════════════════ */
        .hero-parallax {
            height: 250vh;
            position: relative;
        }

        .hero-sticky {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: var(--gradient-dark);
        }

        /* Side Quotes Container */
        .side-quotes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
        }

        .quote-left, .quote-right {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            max-width: 280px;
            text-align: center;
        }

        .quote-left {
            left: 5%;
        }

        .quote-right {
            right: 5%;
        }

        .side-quote {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: absolute;
            width: 100%;
        }

        .side-quote.active {
            opacity: 1;
            transform: translateY(0);
        }

        .quote-text {
            font-size: 1.4rem;
            font-weight: 700;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.4;
            margin-bottom: 0.5rem;
        }

        .quote-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .quote-line {
            width: 50px;
            height: 2px;
            background: var(--gradient-main);
            margin: 1rem auto;
        }

        .hero-content {
            text-align: center;
            z-index: 10;
            padding: 2rem;
        }

        .hero-text-container {
            position: relative;
            height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero-text-item {
            position: absolute;
            width: 100%;
            text-align: center;
            opacity: 0;
            transform: translateY(80px);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hero-text-item.active {
            opacity: 1;
            transform: translateY(0);
        }

        .hero-text-item.exit-up {
            opacity: 0;
            transform: translateY(-80px);
        }

        .hero-tagline {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-purple);
            margin-bottom: 1rem;
        }

        .hero-title {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 1rem;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            font-weight: 300;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        .hero-highlight {
            color: var(--accent-pink);
            font-weight: 600;
            -webkit-text-fill-color: var(--accent-pink);
        }

        .hero-scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            animation: bounce 2s infinite;
        }

        .scroll-mouse {
            width: 22px;
            height: 36px;
            border: 2px solid var(--text-muted);
            border-radius: 11px;
            position: relative;
        }

        .scroll-mouse::before {
            content: '';
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 6px;
            background: var(--accent-purple);
            border-radius: 2px;
            animation: scrollWheel 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(8px); }
        }

        @keyframes scrollWheel {
            0%, 100% { opacity: 1; top: 6px; }
            50% { opacity: 0; top: 16px; }
        }

        /* ═══════════════════════════════════════════════════════════════
           REALISTIC ANATOMY BACKGROUND
           ═══════════════════════════════════════════════════════════════ */
        .anatomy-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.7;
        }

        .anatomy-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .anatomy-layer.active {
            opacity: 1;
        }

        .anatomy-svg {
            max-height: 85vh;
            width: auto;
        }

        /* ═══════════════════════════════════════════════════════════════
           MAIN CONTENT SECTIONS
           ═══════════════════════════════════════════════════════════════ */
        .main-content {
            position: relative;
            z-index: 10;
        }

        section {
            padding: 100px 20px;
            position: relative;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-tag {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-purple);
            margin-bottom: 1rem;
        }

        .section-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .section-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        /* ═══════════════════════════════════════════════════════════════
           COURSES SECTION
           ═══════════════════════════════════════════════════════════════ */
        #courses {
            background: linear-gradient(180deg, 
                rgba(10, 10, 26, 0.95) 0%, 
                rgba(18, 18, 42, 0.98) 100%);
        }

        .courses-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
        }

        .courses-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            width: 100%;
            max-width: 900px;
        }

        .course-card {
            background: rgba(124, 58, 237, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .course-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--gradient-main);
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 0;
        }

        .course-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--accent-purple);
            box-shadow: 0 30px 60px rgba(124, 58, 237, 0.3);
        }

        .course-card:hover::before {
            opacity: 0.1;
        }

        .course-card > * {
            position: relative;
            z-index: 1;
        }

        .course-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
        }

        .course-card h3 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .course-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            line-height: 1.7;
        }

        .course-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1.5rem;
            border-top: 1px solid var(--glass-border);
        }

        .course-duration {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .course-price {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent-pink);
        }

        .course-btn {
            width: 100%;
            padding: 1rem;
            background: var(--gradient-main);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.3s ease;
        }

        .course-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
        }

        /* ═══════════════════════════════════════════════════════════════
           PRICING SECTION
           ═══════════════════════════════════════════════════════════════ */
        #pricing {
            background: linear-gradient(180deg, 
                rgba(18, 18, 42, 0.98) 0%, 
                rgba(10, 10, 26, 0.95) 100%);
        }

        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .pricing-card {
            background: rgba(124, 58, 237, 0.05);
            border: 2px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            text-align: center;
            position: relative;
            transition: all 0.5s ease;
        }

        .pricing-card.featured {
            border-color: var(--accent-purple);
            background: rgba(124, 58, 237, 0.1);
            transform: scale(1.05);
        }

        .pricing-card.featured::before {
            content: 'MOST POPULAR';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gradient-main);
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .pricing-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-purple);
        }

        .pricing-card.featured:hover {
            transform: scale(1.05) translateY(-10px);
        }

        .pricing-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .pricing-description {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .pricing-amount {
            font-size: 3.5rem;
            font-weight: 900;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .pricing-amount span {
            font-size: 1rem;
            font-weight: 400;
            color: var(--text-muted);
            -webkit-text-fill-color: var(--text-muted);
        }

        .pricing-period {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .pricing-features {
            list-style: none;
            text-align: left;
            margin: 1.5rem 0;
        }

        .pricing-features li {
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .pricing-features li::before {
            content: '✓';
            color: var(--accent-purple);
            font-weight: 700;
        }

        .pricing-btn {
            width: 100%;
            padding: 1rem 2rem;
            background: var(--gradient-main);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pricing-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
        }

        .pricing-btn.outline {
            background: transparent;
            border: 2px solid var(--accent-purple);
            color: var(--accent-purple);
        }

        .pricing-btn.outline:hover {
            background: var(--accent-purple);
            color: white;
        }

        /* Business Section */
        .business-section {
            margin-top: 4rem;
            padding: 3rem;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.1) 0%, rgba(236, 72, 153, 0.1) 100%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            text-align: center;
        }

        .business-section h3 {
            font-size: 1.8rem;
            font-weight: 800;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .business-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .business-option {
            background: rgba(10, 10, 26, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
        }

        .business-option h4 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: var(--accent-purple);
        }

        .business-option .price {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent-pink);
            margin: 1rem 0;
        }

        /* ═══════════════════════════════════════════════════════════════
           TESTIMONIALS
           ═══════════════════════════════════════════════════════════════ */
        #testimonials {
            background: linear-gradient(180deg, 
                rgba(10, 10, 26, 0.95) 0%, 
                rgba(18, 18, 42, 0.98) 100%);
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .testimonial-card {
            background: rgba(124, 58, 237, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            transition: all 0.3s ease;
        }

        .testimonial-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-purple);
        }

        .testimonial-stars {
            color: #fbbf24;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .testimonial-text {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        .testimonial-author {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .testimonial-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--gradient-main);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .testimonial-info h4 {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .testimonial-info p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* ═══════════════════════════════════════════════════════════════
           CONTACT SECTION
           ═══════════════════════════════════════════════════════════════ */
        #contact {
            background: linear-gradient(180deg, 
                rgba(18, 18, 42, 0.98) 0%, 
                rgba(10, 10, 26, 1) 100%);
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
        }

        .contact-info h3 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .contact-info p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.8;
        }

        .contact-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .contact-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 1rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .contact-link:hover {
            background: rgba(124, 58, 237, 0.1);
            border-color: var(--accent-purple);
            color: var(--text-primary);
            transform: translateX(10px);
        }

        .contact-link .icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            background: var(--glass-bg);
        }

        .contact-form {
            background: rgba(124, 58, 237, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 1rem;
            background: rgba(10, 10, 26, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
        }

        .form-group textarea {
            min-height: 130px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem 2rem;
            background: var(--gradient-main);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
        }

        /* ═══════════════════════════════════════════════════════════════
           FOOTER
           ═══════════════════════════════════════════════════════════════ */
        footer {
            background: var(--primary-dark);
            border-top: 1px solid var(--glass-border);
            padding: 3rem 2rem;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .footer-brand {
            font-size: 1.4rem;
            font-weight: 800;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .footer-links {
            display: flex;
            gap: 2rem;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--accent-purple);
        }

        .footer-socials {
            display: flex;
            gap: 1rem;
        }

        .footer-socials a {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .footer-socials a:hover {
            background: var(--accent-purple);
            border-color: var(--accent-purple);
            color: white;
            transform: translateY(-3px);
        }

        .footer-bottom {
            max-width: 1200px;
            margin: 2rem auto 0;
            padding-top: 2rem;
            border-top: 1px solid var(--glass-border);
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* ═══════════════════════════════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════════════════════════════ */
        @media (max-width: 1200px) {
            .quote-left, .quote-right {
                max-width: 200px;
            }
            .quote-text {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 1024px) {
            .courses-row {
                grid-template-columns: 1fr;
            }
            .contact-grid {
                grid-template-columns: 1fr;
            }
            .quote-left, .quote-right {
                display: none;
            }
        }

        @media (max-width: 768px) {
            header {
                padding: 1rem;
            }
            nav {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: rgba(10, 10, 26, 0.98);
                backdrop-filter: blur(20px);
                flex-direction: column;
                padding: 1rem;
            }
            nav.active {
                display: flex;
            }
            .hamburger {
                display: flex;
            }
            .dropdown {
                position: static;
                transform: none;
                width: 100%;
                min-width: auto;
                box-shadow: none;
                border: none;
                background: transparent;
            }
            .nav-item:hover .dropdown {
                transform: none;
            }
            .pricing-card.featured {
                transform: scale(1);
            }
            .pricing-card.featured:hover {
                transform: translateY(-10px);
            }
            .footer-content {
                flex-direction: column;
                text-align: center;
            }
            .footer-links {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
